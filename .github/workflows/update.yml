name: Update Global Magazine

on:
  schedule:
    - cron: '0 */4 * * *' # هر 4 ساعت یکبار اجرا می‌شود
  workflow_dispatch: # امکان اجرای دستی

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 jdatetime pytz

      - name: Run Scraper
        run: |
          # جستجو برای اجرای فایل پایتون
          if [ -f global_news.py ]; then
            echo "Running global_news.py..."
            python global_news.py
          elif [ -f main.py ]; then
            echo "Running main.py..."
            python main.py
          else
            echo "Searching for any python file..."
            python *.py || echo "No python file found!"
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          # اضافه کردن فایل index.html تولید شده
          if [ -f index.html ]; then
            git add index.html
            git commit -m "Update Global News Content [$(date)]" || echo "No changes to commit"
            git push
          else
            echo "index.html not found, nothing to commit."
          fi
