name: Update Global Mahoor Magazine

on:
  schedule:
    - cron: '0 */4 * * *' # هر ۴ ساعت یکبار
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 jdatetime pytz

      - name: Run news scraper
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Global News Update $(date)" || exit 0
          git push
