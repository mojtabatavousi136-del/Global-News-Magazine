name: Update Mahoor News Magazine

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4 jdatetime pytz

      - name: Run Scrapers
        run: |
          python fetch_news.py
          python global_news.py

      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add index.html global.html
          git commit -m "Update Persian and Global news" || echo "No changes to commit"
          git push
