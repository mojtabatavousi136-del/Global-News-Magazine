name: Update Global Mahoor Magazine

on:
  schedule:
    # اجرا دقیقاً هر 2 ساعت یکبار
    - cron: '0 */2 * * *'
  workflow_dispatch: # قابلیت اجرای دستی

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 jdatetime pytz

      - name: Run news scraper
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git commit -m "Update News: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || exit 0
          git push
